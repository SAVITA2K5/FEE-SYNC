<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Status - Fee Sync System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-university me-2"></i>Fee Sync System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="payment.html">Payment</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="status.html">Check Status</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="admin.html">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg">
                    <div class="card-header bg-info text-white">
                        <h4 class="mb-0"><i class="fas fa-search me-2"></i>Check Fee Status</h4>
                    </div>
                    <div class="card-body">
                        <!-- Search Form -->
                        <form id="statusForm">
                            <div class="input-group mb-3">
                                <input type="text" class="form-control" id="rollNumber"
                                    placeholder="Enter roll number (e.g., 22CS001)" required>
                                <button class="btn btn-info" type="submit">
                                    <i class="fas fa-search me-2"></i>Search
                                </button>
                            </div>
                        </form>

                        <!-- Status Section -->
                        <div id="statusSection" style="display: none;">
                            <div class="card bg-light">
                                <div class="card-body">
                                    <h5 class="card-title text-primary">
                                        <i class="fas fa-user-graduate me-2"></i>Student Fee Information
                                    </h5>
                                    <hr>
                                    <div class="row">
                                        <div class="col-md-6">
                                            <p><strong>Roll Number:</strong></p>
                                            <p id="studentRoll"></p>
                                        </div>
                                        <div class="col-md-6">
                                            <p><strong>Name:</strong></p>
                                            <p id="studentName"></p>
                                        </div>
                                        <div class="col-md-4">
                                            <p><strong>Total Fee:</strong></p>
                                            <p class="text-primary" id="totalFee"></p>
                                        </div>
                                        <div class="col-md-4">
                                            <p><strong>Paid Amount:</strong></p>
                                            <p class="text-success" id="paidAmount"></p>
                                        </div>
                                        <div class="col-md-4">
                                            <p><strong>Due Amount:</strong></p>
                                            <p class="text-danger" id="dueAmount"></p>
                                        </div>
                                        <div class="col-md-12">
                                            <p><strong>Status:</strong></p>
                                            <span class="badge" id="statusBadge"></span>
                                        </div>
                                    </div>

                                    <!-- No-Due Check Button -->
                                    <button class="btn btn-success w-100 mt-3" id="checkNoDueBtn">
                                        <i class="fas fa-certificate me-2"></i>Check No-Due Status
                                    </button>

                                    <!-- No-Due Result -->
                                    <div id="noDueResult" class="mt-3" style="display: none;"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Error Section -->
                        <div id="errorSection" style="display: none;">
                            <div class="alert alert-danger" role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                <span id="errorMessage"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 Fee Sync System. Real-Time Payment Synchronization.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/status.js"></script>
</body>

</html>
